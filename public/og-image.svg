<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1e293b"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Map pin icon -->
  <g transform="translate(340, 100)">
    <path d="M96 20 C56 20 28 48 28 88 C28 140 96 200 96 200 C96 200 164 140 164 88 C164 48 136 20 96 20Z" fill="#059669" opacity="0.9"/>
    <path d="M96 20 C56 20 28 48 28 88 C28 140 96 200 96 200 C96 200 164 140 164 88 C164 48 136 20 96 20Z" fill="none" stroke="#34d399" stroke-width="4"/>
    <circle cx="96" cy="82" r="24" fill="#1e293b"/>
    <circle cx="96" cy="82" r="18" fill="none" stroke="#34d399" stroke-width="3"/>
    <line x1="96" y1="57" x2="96" y2="67" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
    <line x1="96" y1="97" x2="96" y2="107" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
    <line x1="71" y1="82" x2="81" y2="82" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
    <line x1="111" y1="82" x2="121" y2="82" stroke="#34d399" stroke-width="3" stroke-linecap="round"/>
    <circle cx="96" cy="82" r="5" fill="#34d399"/>
  </g>
  <!-- Text -->
  <text x="520" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white">Census GeoTagger</text>
  <text x="520" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">Field Survey & Geolocation Logger</text>
  <!-- Feature pills -->
  <g transform="translate(520, 320)">
    <rect x="0" y="0" width="130" height="36" rx="18" fill="#334155"/>
    <text x="65" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Offline-First</text>

    <rect x="145" y="0" width="100" height="36" rx="18" fill="#334155"/>
    <text x="195" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">GPS Tag</text>

    <rect x="260" y="0" width="140" height="36" rx="18" fill="#334155"/>
    <text x="330" y="23" font-family="system-ui, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">Map + Export</text>
  </g>
  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">cgt.ajithrn.com</text>
